name: ConcursoTrack — Scraper de Editais

on:
  schedule:
    - cron: "0 11,21 * * *"
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install httpx beautifulsoup4 supabase python-dotenv

      - name: Executar scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper/scraper_concursotrack.py

      - name: Disparar envio de notificações
        env:
          APP_URL:     ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X POST "$APP_URL/api/notif/send" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Notificar em caso de falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Scraper/notif falhou em ${new Date().toISOString()}`,
              body:  `Workflow: ${context.workflow}\nRun ID: ${context.runId}`,
              labels: ['bug', 'scraper']
            })
