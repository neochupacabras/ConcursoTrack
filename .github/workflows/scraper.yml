name: ConcursoTrack — Scraper de Editais

on:
  schedule:
    - cron: "0 11,21 * * *"
  workflow_dispatch:
    inputs:
      modo:
        description: 'teste = 5 links sem banco | completo = producao'
        required: true
        default: 'teste'
        type: choice
        options:
          - teste
          - completo

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install httpx beautifulsoup4 supabase python-dotenv

      - name: Modo TESTE (5 links, sem banco)
        if: github.event.inputs.modo == 'teste'
        run: python scraper/scraper_test.py

      - name: Modo COMPLETO (producao com banco)
        if: github.event.inputs.modo == 'completo' || github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper/scraper_concursotrack.py

      - name: Disparar notificacoes
        if: github.event.inputs.modo == 'completo' || github.event_name == 'schedule'
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X POST "$APP_URL/api/notif/send" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Notificar falha
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scraper falhou em ${new Date().toISOString()}`,
              body: `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug']
            })
